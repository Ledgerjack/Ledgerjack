name: Dependency audit

# Weekly INFORMATIONAL check for known-vulnerable dependencies. This reports
# findings but does not fail the build: most advisories are in dev-only tooling
# (test runner, bundler) that never ships to users, so a red X on every push
# would be misleading. Real issues in shipped dependencies are handled promptly
# (see SECURITY.md); this job surfaces them for review.
on:
  schedule:
    - cron: "0 6 * * 1" # Mondays, 06:00 UTC
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "package.json"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm install
      # Report PRODUCTION dependency advisories (the code users actually run).
      # `|| true` keeps this informational — it never fails the pipeline.
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high || true
      # Full report (including dev tooling) for visibility, also non-blocking.
      - name: Full audit report (informational)
        run: npm audit || true
