name: Dependency audit

# Weekly check for known-vulnerable dependencies. Supports the badge criteria on
# promptly detecting and fixing publicly-known vulnerabilities in dependencies.
on:
  schedule:
    - cron: "0 6 * * 1" # Mondays, 06:00 UTC
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "package.json"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm install
      # Fail only on high/critical so routine advisories dont block work.
      - name: npm audit (high and critical)
        run: npm audit --audit-level=high
